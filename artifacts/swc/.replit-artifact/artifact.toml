kind = "web"
previewPath = "/"
title = "SWC 2.0 | The New Collection"
version = "1.0.0"
id = "artifacts/swc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19105
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/swc run dev"

[services.env]
PORT = "19105"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/swc", "run", "build"]
publicDir = "artifacts/swc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
